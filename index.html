<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f6f9; color: #333; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 40px 20px; }
        
        /* Auth Screen Styling */
        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #2c3e50; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .auth-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; max-width: 400px; width: 100%; }
        .auth-box h2 { margin-bottom: 20px; color: #2c3e50; }
        .auth-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 1rem; }
        .auth-box button { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
        .auth-box button:hover { background: #2980b9; }
        #msg { margin-top: 15px; font-size: 0.9rem; color: #e74c3c; font-weight: 500; }

        /* Dashboard View Styling */
        #dashboard-content { display: none; flex-direction: column; align-items: center; width: 100%; }
        h1 { margin-bottom: 10px; color: #2c3e50; }
        p.subtitle { color: #7f8c8d; margin-bottom: 30px; font-size: 1.1rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; max-width: 900px; width: 100%; }
        
        /* Cards styling with modern micro-interactions */
        .card { display: none; background: white; border-radius: 12px; padding: 30px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.03); text-decoration: none; color: inherit; border: 1px solid #e2e8f0; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); cursor: pointer; }
        .card:hover { transform: translateY(-8px); box-shadow: 0 12px 20px rgba(52, 152, 219, 0.15); border-color: #3498db; }
        .card:hover h2 { color: #0369a1; }
        .card:active { transform: translateY(-2px) scale(0.98); }
        .card h2 { color: #2c3e50; margin-bottom: 12px; font-size: 1.4rem; transition: color 0.2s ease; }
        .card p { color: #64748b; font-size: 0.95rem; line-height: 1.5; }
        .badge { display: inline-block; background: #e0f2fe; color: #0369a1; padding: 4px 12px; border-radius: 50px; font-size: 0.75rem; font-weight: 600; margin-bottom: 15px; text-transform: uppercase; }
        .logout-btn { background: #e74c3c; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-bottom: 30px; font-weight: 600; transition: background 0.2s; }
        .logout-btn:hover { background: #c0392b; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h2>Hub Login</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="handleLogin()">Login</button>
            <p id="msg"></p>
        </div>
    </div>

    <div id="dashboard-content">
        <h1>Internal Operations Hub</h1>
        <p class="subtitle">Select an application below to get started</p>
        <button class="logout-btn" onclick="location.reload()">Log Out</button>

        <div class="grid">
            <a href="https://kshekhawat73.github.io/attendance/" target="_blank" class="card" id="app-attendance">
                <span class="badge">Management</span>
                <h2>Manager Attendance</h2>
                <p>Track, view, and manage daily staff attendance logs and clock-in metrics.</p>
            </a>

            <a href="https://kshekhawat73.github.io/store-outstanding-dashboard/" target="_blank" class="card" id="app-outstanding">
                <span class="badge">Finance</span>
                <h2>Stores Outstanding</h2>
                <p>Monitor pending balances, store invoices, and credit details in real-time.</p>
            </a>
        </div>
    </div>

    <script>
        // 🛠️ LINKED TO YOUR LIVE GOOGLE SHEET
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTjOK2FMrqyQHeIIITmiJ_vKB88pBceqYLQa4rUFzReHNF0Pybl7afELbIPHiu3jypMc4vS0UtGEWmu/pub?output=csv";

        // Processes the sheet rows safely into usable user objects
        function parseCSV(csvText) {
            const lines = csvText.split("\n");
            if(lines.length < 2) return {};
            
            // Clean out line breaks and spaces from headers
            const headers = lines[0].split(",").map(h => h.replace(/[\r\n]+/g, '').trim().toLowerCase());
            const users = {};

            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                
                // Split the columns safely
                const currentline = lines[i].split(",").map(item => item.replace(/[\r\n]+/g, '').trim());
                const username = currentline[0].toLowerCase();
                
                users[username] = {
                    password: currentline[1],
                    attendance: currentline[2] ? currentline[2].toLowerCase() : "no",
                    outstanding: currentline[3] ? currentline[3].toLowerCase() : "no"
                };
            }
            return users;
        }

        async function handleLogin() {
            const userIn = document.getElementById('username').value.trim().toLowerCase();
            const passIn = document.getElementById('password').value;
            const msg = document.getElementById('msg');

            if (!userIn || !passIn) {
                msg.style.color = "#e74c3c";
                msg.innerText = "Please enter both fields.";
                return;
            }

            msg.style.color = "#3498db";
            msg.innerText = "Verifying access permissions...";

            try {
                // Adds a unique timestamp parameter to prevent the browser from caching old spreadsheet data
                const liveUrl = SHEET_CSV_URL + "&cb=" + new Date().getTime();
                
                const response = await fetch(liveUrl);
                const csvText = await response.text();
                const userDatabase = parseCSV(csvText);

                // Check if user credentials match
                if (userDatabase[userIn] && userDatabase[userIn].password === passIn) {
                    const userData = userDatabase[userIn];

                    // Transition out the login wall
                    document.getElementById('auth-screen').style.display = 'none';
                    document.getElementById('dashboard-content').style.display = 'flex';

                    // Reveal matching applications based on "yes" settings
                    if (userData.attendance === 'yes') document.getElementById('app-attendance').style.display = 'block';
                    if (userData.outstanding === 'yes') document.getElementById('app-outstanding').style.display = 'block';
                } else {
                    msg.style.color = "#e74c3c";
                    msg.innerText = "Access Denied. Account details are incorrect or pending approval.";
                }
            } catch (err) {
                console.error(err);
                msg.style.color = "#e74c3c";
                msg.innerText = "Network error syncing permissions sheet.";
            }
        }
    </script>
</body>
</html>
